name: Mise à jour quotidienne des offres

on:
  schedule:
    - cron: "0 5 * * *"   # 05:00 UTC chaque jour (~07:00 heure de Paris)
  workflow_dispatch: {}     # permet un lancement manuel depuis l'onglet Actions

permissions:
  contents: write

jobs:
  update-offres:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install pyyaml

      - name: Exécuter le script de récupération des offres
        env:
          LBA_API_TOKEN: ${{ secrets.LBA_API_TOKEN }}
          # DEBUG_LBA: "1"   # décommenter temporairement en cas de diagnostic
        run: python scripts/fetch_offres.py

      - name: Publier les changements si nécessaire
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/offres.json
          if git diff --cached --quiet; then
            echo "Aucun changement à publier."
          else
            git commit -m "Mise à jour automatique des offres"
            git push
          fi
